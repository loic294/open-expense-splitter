services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      # Map root .env variables to VITE_* for the frontend
      - VITE_PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-http://localhost:3000}
      - VITE_AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - VITE_AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - TAILWIND_DISABLE_OXIDE=1
    volumes:
      - ./client/src:/app/src
    depends_on:
      - backend
    command: npm run dev

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      # PUBLIC_FRONTEND_URL, AUTH0_* loaded from .env via env_file
    volumes:
      - ./server/src:/app/src
      - db_data:/app/data
    command: npm run dev

volumes:
  db_data:
