name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required repository secrets:
#   CLOUDFLARE_API_TOKEN  — token with Workers, D1, and Pages edit permissions
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#
# Required repository variables (Settings → Variables → Actions):
#   AUTH0_DOMAIN          — e.g. yourapp.auth0.com
#   AUTH0_CLIENT_ID       — Auth0 SPA client ID
#   CF_WORKER_URL         — URL of the deployed Worker, e.g. https://batch-spending-splitter-api.<subdomain>.workers.dev
#
# One-time setup (run locally before the first deploy):
#   cd server
#   npx wrangler d1 create batch-spending-splitter
#   # Copy the database_id into server/wrangler.toml
#   npx wrangler pages project create batch-spending-splitter

jobs:
  deploy-worker:
    name: Deploy API Worker + D1 migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: d1 migrations apply batch-spending-splitter --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server

  deploy-pages:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.CF_WORKER_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: client
          command: pages deploy dist --project-name=batch-spending-splitter
