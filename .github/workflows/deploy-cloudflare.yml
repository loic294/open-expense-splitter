name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Required repository secrets:
#   CLOUDFLARE_API_TOKEN  — token with Workers, D1, and Pages edit permissions
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID
#   CF_D1_DATABASE_ID     — D1 database UUID used by server/wrangler.toml
#
# Required repository variables (Settings → Variables → Actions):
#   AUTH0_DOMAIN          — e.g. yourapp.auth0.com
#   AUTH0_CLIENT_ID       — Auth0 SPA client ID
#   PUBLIC_FRONTEND_URL   — public Pages hostname, e.g. https://open-expense-splitter.pages.dev
#   APP_BASE_URL          — canonical frontend URL, e.g. https://open-expense-splitter.loicba.me
#   CF_WORKER_URL         — URL of the deployed Worker, e.g. https://open-expense-splitter-api.<subdomain>.workers.dev
#
# One-time setup (run locally before the first deploy):
#   cd server
#   npx wrangler@4 d1 create open-expense-splitter
#   # Save the returned database_id as repo secret CF_D1_DATABASE_ID
#   npx wrangler@4 pages project create open-expense-splitter

jobs:
  deploy-worker:
    name: Deploy API Worker + D1 migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Inject D1 database ID into Wrangler config
        env:
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          if [ -z "$CF_D1_DATABASE_ID" ]; then
            echo "Error: Missing GitHub secret CF_D1_DATABASE_ID"
            echo "Set it in Settings -> Secrets and variables -> Actions -> Secrets"
            exit 1
          fi
          sed -i.bak "s/REPLACE_WITH_YOUR_D1_DATABASE_ID/$CF_D1_DATABASE_ID/g" wrangler.toml

      - name: Inject Auth0 config into Wrangler config
        env:
          AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}
        run: |
          if [ -z "$AUTH0_DOMAIN" ] || [ -z "$AUTH0_CLIENT_ID" ]; then
            echo "Error: Missing GitHub variables AUTH0_DOMAIN or AUTH0_CLIENT_ID"
            echo "Set them in Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi
          sed -i.bak "s|YOUR_AUTH0_DOMAIN.auth0.com|$AUTH0_DOMAIN|g" wrangler.toml
          sed -i.bak "s|YOUR_AUTH0_CLIENT_ID|$AUTH0_CLIENT_ID|g" wrangler.toml

      - name: Inject frontend URLs into Wrangler config
        env:
          ACTIONS_VARS_JSON: ${{ toJson(vars) }}
        run: |
          PUBLIC_FRONTEND_URL=$(node -e 'const vars = JSON.parse(process.env.ACTIONS_VARS_JSON || "{}"); process.stdout.write(vars.PUBLIC_FRONTEND_URL || "")')
          APP_BASE_URL=$(node -e 'const vars = JSON.parse(process.env.ACTIONS_VARS_JSON || "{}"); process.stdout.write(vars.APP_BASE_URL || "")')

          if [ -z "$PUBLIC_FRONTEND_URL" ] || [ -z "$APP_BASE_URL" ]; then
            echo "Error: Missing GitHub variables PUBLIC_FRONTEND_URL or APP_BASE_URL"
            echo "Set them in Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi
          sed -i.bak "s|REPLACE_WITH_PUBLIC_FRONTEND_URL|$PUBLIC_FRONTEND_URL|g" wrangler.toml
          sed -i.bak "s|REPLACE_WITH_APP_BASE_URL|$APP_BASE_URL|g" wrangler.toml

      - name: Validate Wrangler config
        run: |
          if grep -q 'REPLACE_WITH_YOUR_D1_DATABASE_ID' wrangler.toml; then
            echo "Error: server/wrangler.toml still contains REPLACE_WITH_YOUR_D1_DATABASE_ID"
            echo "Set GitHub secret CF_D1_DATABASE_ID to your D1 UUID"
            exit 1
          fi
          if grep -q 'REPLACE_WITH_PUBLIC_FRONTEND_URL' wrangler.toml || grep -q 'REPLACE_WITH_APP_BASE_URL' wrangler.toml; then
            echo "Error: server/wrangler.toml still contains frontend URL placeholder values"
            echo "Set GitHub variables PUBLIC_FRONTEND_URL and APP_BASE_URL"
            exit 1
          fi
          if grep -q 'YOUR_AUTH0_DOMAIN' wrangler.toml || grep -q 'YOUR_AUTH0_CLIENT_ID' wrangler.toml; then
            echo "Error: server/wrangler.toml still contains Auth0 placeholder values"
            echo "Set GitHub variables AUTH0_DOMAIN and AUTH0_CLIENT_ID"
            exit 1
          fi

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: d1 migrations apply open-expense-splitter --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server

  deploy-pages:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    env:
      CF_PAGES_PROJECT_NAME: open-expense-splitter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Inject backend URL into frontend Wrangler config
        working-directory: client
        env:
          CF_WORKER_URL: ${{ vars.CF_WORKER_URL }}
        run: |
          if [ -z "$CF_WORKER_URL" ]; then
            echo "Error: Missing GitHub variable CF_WORKER_URL"
            echo "Set it in Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi
          sed -i.bak "s|REPLACE_WITH_CF_WORKER_URL|$CF_WORKER_URL|g" wrangler.toml

      - name: Inject Pages URL into static headers
        working-directory: client
        env:
          CF_PAGES_PROJECT_NAME: ${{ env.CF_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$CF_PAGES_PROJECT_NAME" ]; then
            echo "Error: Missing CF_PAGES_PROJECT_NAME"
            exit 1
          fi

          CF_PAGES_URL="https://${CF_PAGES_PROJECT_NAME}.pages.dev"
          sed -i.bak "s|REPLACE_WITH_CF_PAGES_URL|$CF_PAGES_URL|g" public/_headers

      - name: Validate frontend Wrangler config
        working-directory: client
        run: |
          if grep -q 'REPLACE_WITH_CF_WORKER_URL' wrangler.toml; then
            echo "Error: client/wrangler.toml still contains REPLACE_WITH_CF_WORKER_URL"
            echo "Set GitHub variable CF_WORKER_URL"
            exit 1
          fi
          if grep -q 'REPLACE_WITH_CF_PAGES_URL' public/_headers; then
            echo "Error: client/public/_headers still contains REPLACE_WITH_CF_PAGES_URL"
            exit 1
          fi

      - name: Build frontend
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.CF_WORKER_URL }}
          VITE_AUTH0_DOMAIN: ${{ vars.AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.AUTH0_CLIENT_ID }}

      - name: Ensure Cloudflare Pages project exists
        working-directory: client
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Error: Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

          PROJECT_NAME="${CF_PAGES_PROJECT_NAME:-open-expense-splitter}"

          echo "Creating Pages project '$PROJECT_NAME' (skipping if it already exists)..."
          CREATE_OUTPUT=$(npx wrangler@4 pages project create "$PROJECT_NAME" --production-branch=main 2>&1) && true
          if echo "$CREATE_OUTPUT" | grep -q "already exists"; then
            echo "Pages project already exists, continuing."
          elif echo "$CREATE_OUTPUT" | grep -qi "error\|failed"; then
            echo "$CREATE_OUTPUT"
            exit 1
          else
            echo "$CREATE_OUTPUT"
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: client
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT_NAME:-open-expense-splitter}"
          npx wrangler@4 pages deploy dist --project-name="$PROJECT_NAME" --commit-dirty=true
