name = "open-expense-splitter-api"
main = "src/worker.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "open-expense-splitter"
# Replace with the ID from: npx wrangler@4 d1 create open-expense-splitter
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

migrations_dir = "migrations"

# Non-secret configuration. Set the correct values for your deployment.
[vars]
# Public Pages hostname, can be the .pages.dev domain or your custom domain.
# This is used for CORS and fallback purposes.
PUBLIC_FRONTEND_URL = "REPLACE_WITH_PUBLIC_FRONTEND_URL"
# Canonical frontend URL used for generating invite links and other user-facing URLs.
# MUST be your official domain (not .pages.dev).
# Example: https://open-expense-splitter.loicba.me or https://myapp.com
# Invite links will use this URL, so it must be your official domain!
APP_BASE_URL = "REPLACE_WITH_APP_BASE_URL"
AUTH0_DOMAIN = "YOUR_AUTH0_DOMAIN.auth0.com"
AUTH0_CLIENT_ID = "YOUR_AUTH0_CLIENT_ID"

# Secrets (never commit these — set them via CLI or the Cloudflare dashboard):
#   npx wrangler@4 secret put AUTH0_DOMAIN
#   npx wrangler@4 secret put AUTH0_CLIENT_ID
#   npx wrangler@4 secret put AUTH0_CLIENT_SECRET
#
# Or set them as environment secrets in the GitHub Actions workflow.

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
