name = "batch-spending-splitter-api"
main = "src/worker.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "batch-spending-splitter"
# Replace with the ID from: npx wrangler d1 create batch-spending-splitter
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[migrations_dir]
path = "migrations"

# Non-secret configuration. Set the correct values for your deployment.
[vars]
APP_BASE_URL = "https://batch-spending-splitter.pages.dev"
AUTH0_DOMAIN = "YOUR_AUTH0_DOMAIN.auth0.com"
AUTH0_CLIENT_ID = "YOUR_AUTH0_CLIENT_ID"
# AUTH0_AUDIENCE = "YOUR_API_IDENTIFIER"  # uncomment if using a custom API audience

# Secrets (never commit these — set them via CLI or the Cloudflare dashboard):
#   npx wrangler secret put AUTH0_DOMAIN
#   npx wrangler secret put AUTH0_CLIENT_ID
#
# Or set them as environment secrets in the GitHub Actions workflow.
